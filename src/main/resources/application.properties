# ==========================================
# Configuration MySQL - JFC1 Monitoring
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/jfc1_monitoring?useSSL=false&serverTimezone=Africa/Casablanca&allowPublicKeyRetrieval=true
spring.datasource.username=jfc1_user
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==========================================
# Serveur
# ==========================================
server.port=8080
server.servlet.context-path=/api

# ==========================================
# Jackson - format des dates
# ==========================================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Africa/Casablanca

# ==========================================
# Logging
# ==========================================
logging.level.ma.ocp=INFO
logging.level.org.hibernate.SQL=WARN